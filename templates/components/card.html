<div class="app-card {{ class_name|default:'' }}">
    {% if title or subtitle %}
        <div class="mb-4">
            {% if title %}<h3 class="text-base font-bold tracking-tight">{{ title }}</h3>{% endif %}
            {% if subtitle %}<p class="mt-1 text-sm text-slate-500 dark:text-slate-400">{{ subtitle }}</p>{% endif %}
        </div>
    {% endif %}
    {% if body %}
        {{ body|safe }}
    {% endif %}
</div>
