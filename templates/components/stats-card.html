<div class="app-card">
    <div class="flex items-start justify-between">
        <div>
            <p class="text-sm font-semibold text-slate-500 dark:text-slate-400">{{ title }}</p>
            <p class="mt-3 text-3xl font-extrabold tracking-tight">{{ value }}</p>
        </div>
        <span class="inline-flex h-10 w-10 items-center justify-center rounded-lg bg-slate-100 text-slate-700 dark:bg-slate-800 dark:text-slate-300">
            <i data-lucide="{{ icon|default:'bar-chart-3' }}" class="h-5 w-5"></i>
        </span>
    </div>
    {% if subtitle %}
        <p class="mt-3 text-xs font-medium text-slate-500 dark:text-slate-400">{{ subtitle }}</p>
    {% endif %}
</div>
