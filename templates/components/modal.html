<div
    x-show="{{ modal_state|default:'false' }}"
    x-cloak
    class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/60 p-4"
>
    <div class="w-full max-w-md rounded-xl border border-slate-200 bg-white p-6 shadow-soft dark:border-slate-700 dark:bg-slate-900">
        <h3 class="text-lg font-bold tracking-tight">{{ modal_title|default:"Confirmation" }}</h3>
        <p class="mt-2 text-sm text-slate-600 dark:text-slate-300">{{ modal_text|default:"Are you sure you want to continue?" }}</p>
        <div class="mt-6 flex items-center justify-end gap-3">
            <button type="button" class="btn-secondary" @click="{{ modal_close|default:'false' }}">Cancel</button>
            <button type="button" class="btn-danger">{{ modal_action|default:"Confirm" }}</button>
        </div>
    </div>
</div>
