<div
    x-show="sidebarOpen"
    x-cloak
    class="fixed inset-0 z-30 bg-slate-900/40 backdrop-blur-sm lg:hidden"
    @click="sidebarOpen = false"
></div>

<aside
    :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'"
    class="fixed inset-y-0 left-0 z-40 flex w-72 flex-col border-r border-slate-200 bg-white px-4 py-5 transition-transform duration-200 dark:border-slate-800 dark:bg-slate-900 lg:static lg:translate-x-0"
>
    <div class="mb-6 flex items-center justify-between">
        <a href="{% url 'consumer_dashboard' %}" class="flex items-center gap-3">
            <span class="inline-flex h-10 w-10 items-center justify-center rounded-lg bg-brand-600 text-white">
                <i data-lucide="zap" class="h-5 w-5"></i>
            </span>
            <span>
                <span class="block text-sm font-semibold text-slate-500 dark:text-slate-400">Consumer Portal</span>
                <span class="block text-base font-extrabold tracking-tight">Smart Billing</span>
            </span>
        </a>
        <button
            type="button"
            class="rounded-lg border border-slate-300 p-2 text-slate-600 transition hover:bg-slate-100 dark:border-slate-700 dark:text-slate-300 dark:hover:bg-slate-800 lg:hidden"
            @click="sidebarOpen = false"
        >
            <i data-lucide="x" class="h-4 w-4"></i>
        </button>
    </div>

    <nav class="space-y-1">
        <a
            href="{% url 'consumer_dashboard' %}"
            class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-semibold transition {% if request.resolver_match.url_name == 'consumer_dashboard' %}bg-slate-900 text-white dark:bg-brand-500{% else %}text-slate-600 hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-800{% endif %}"
        >
            <i data-lucide="layout-dashboard" class="h-4 w-4"></i>
            My Dashboard
        </a>
        <a
            href="{% url 'consumer_bill_list' %}"
            class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-semibold transition {% if request.resolver_match.url_name == 'consumer_bill_list' or request.resolver_match.url_name == 'consumer_bill_detail' %}bg-slate-900 text-white dark:bg-brand-500{% else %}text-slate-600 hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-800{% endif %}"
        >
            <i data-lucide="receipt-text" class="h-4 w-4"></i>
            My Bills
        </a>
    </nav>

    <div class="mt-6 border-t border-slate-200 pt-6 dark:border-slate-800">
        <p class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Consumer Number</p>
        <p class="mt-1 text-sm font-bold">{{ consumer.consumer_number }}</p>
    </div>

    <div class="mt-auto rounded-xl border border-slate-200 bg-slate-50 p-4 dark:border-slate-700 dark:bg-slate-800/70">
        <p class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Connection Type</p>
        <p class="mt-2 text-sm font-bold">{{ consumer.connection_type }}</p>
    </div>
</aside>
