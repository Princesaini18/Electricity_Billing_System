<header class="sticky top-0 z-20 border-b border-slate-200 bg-white/80 backdrop-blur dark:border-slate-800 dark:bg-slate-900/80">
    <div class="flex items-center justify-between gap-4 px-4 py-4 sm:px-6 lg:px-8">
        <div class="flex min-w-0 items-center gap-3">
            <button
                type="button"
                class="inline-flex h-10 w-10 items-center justify-center rounded-lg border border-slate-300 text-slate-600 transition hover:bg-slate-100 dark:border-slate-700 dark:text-slate-300 dark:hover:bg-slate-800 lg:hidden"
                @click="sidebarOpen = true"
            >
                <i data-lucide="menu" class="h-5 w-5"></i>
            </button>
            <div class="min-w-0">
                <p class="truncate text-base font-extrabold tracking-tight">Consumer Billing Portal</p>
                <p class="text-xs font-medium text-slate-500 dark:text-slate-400">View usage and bill payment status</p>
            </div>
        </div>

        <div class="flex items-center gap-2 sm:gap-3">
            <button
                type="button"
                id="themeToggle"
                class="inline-flex h-10 w-10 items-center justify-center rounded-lg border border-slate-300 text-slate-600 transition hover:bg-slate-100 dark:border-slate-700 dark:text-slate-300 dark:hover:bg-slate-800"
            >
                <i data-lucide="moon" class="h-4 w-4 dark:hidden"></i>
                <i data-lucide="sun" class="hidden h-4 w-4 dark:inline"></i>
            </button>
            <span class="hidden rounded-lg border border-slate-300 px-3 py-2 text-sm font-semibold text-slate-700 dark:border-slate-700 dark:text-slate-300 sm:inline-flex">
                <i data-lucide="user-round" class="mr-2 h-4 w-4"></i>
                {{ consumer.name }}
            </span>
            <form method="post" action="{% url 'consumer_logout' %}">
                {% csrf_token %}
                <button class="btn-secondary" type="submit">
                    <i data-lucide="log-out" class="h-4 w-4"></i>
                    <span class="hidden sm:inline">Logout</span>
                </button>
            </form>
        </div>
    </div>
</header>
